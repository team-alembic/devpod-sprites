name: sprites
version: ##VERSION##
description: DevPod on Sprites.dev
icon: https://sprites.dev/images/favicon/apple-touch-icon.png
options:
  SPRITE_TOKEN:
    description: "Sprites.dev API token"
    required: true
    password: true
  AGENT_PATH:
    description: "Path to inject the DevPod agent on the sprite"
    default: /tmp/devpod
agent:
  path: ${AGENT_PATH}
binaries:
  SPRITES_PROVIDER:
    - os: linux
      arch: amd64
      path: https://github.com/team-alembic/devpod-sprites/releases/download/##VERSION##/devpod-provider-sprites-linux-amd64
      checksum: ##CHECKSUM_LINUX_AMD64##
    - os: linux
      arch: arm64
      path: https://github.com/team-alembic/devpod-sprites/releases/download/##VERSION##/devpod-provider-sprites-linux-arm64
      checksum: ##CHECKSUM_LINUX_ARM64##
    - os: darwin
      arch: amd64
      path: https://github.com/team-alembic/devpod-sprites/releases/download/##VERSION##/devpod-provider-sprites-darwin-amd64
      checksum: ##CHECKSUM_DARWIN_AMD64##
    - os: darwin
      arch: arm64
      path: https://github.com/team-alembic/devpod-sprites/releases/download/##VERSION##/devpod-provider-sprites-darwin-arm64
      checksum: ##CHECKSUM_DARWIN_ARM64##
    - os: windows
      arch: amd64
      path: https://github.com/team-alembic/devpod-sprites/releases/download/##VERSION##/devpod-provider-sprites-windows-amd64.exe
      checksum: ##CHECKSUM_WINDOWS_AMD64##
exec:
  init: ${SPRITES_PROVIDER} init
  command: ${SPRITES_PROVIDER} command
  create: ${SPRITES_PROVIDER} create
  delete: ${SPRITES_PROVIDER} delete
  status: ${SPRITES_PROVIDER} status
